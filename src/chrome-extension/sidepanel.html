<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CC Channel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #1a1a2e; color: #e0e0e0;
  height: 100vh; display: flex; flex-direction: column;
}
.header {
  display: flex; align-items: center; gap: 8px;
  padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.08);
}
.header h1 { font-size: 14px; font-weight: 600; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #555; }
.status-dot.online { background: #4caf50; }
.content { flex: 1; overflow-y: auto; padding: 12px; }
.section { margin-bottom: 16px; }
.section-title { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.btn {
  width: 100%; padding: 8px 12px; border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; background: rgba(255,255,255,0.05); color: #e0e0e0;
  font-size: 13px; cursor: pointer; text-align: left;
}
.btn:hover { background: rgba(255,255,255,0.08); }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn-primary { background: #0f3460; border-color: #53a8b6; text-align: center; }
.preview {
  margin-top: 8px; padding: 8px; border-radius: 6px;
  background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
  font-size: 12px; line-height: 1.5; max-height: 200px; overflow-y: auto;
}
.preview-title { font-weight: 600; margin-bottom: 2px; }
.preview-url { color: #53a8b6; font-size: 11px; word-break: break-all; margin-bottom: 6px; }
.preview-body { color: #aaa; white-space: pre-wrap; word-break: break-word; }
.input-bar {
  display: flex; gap: 6px; padding: 8px 12px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
textarea {
  flex: 1; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; padding: 6px 8px; font-size: 13px; color: #e0e0e0;
  resize: none; outline: none; font-family: inherit;
}
.send-btn {
  padding: 6px 12px; border-radius: 6px; border: none;
  background: #53a8b6; color: #fff; font-size: 13px; cursor: pointer;
}
.send-btn:disabled { opacity: 0.3; }
.msg { padding: 6px 10px; border-radius: 10px; margin-bottom: 4px; font-size: 13px; line-height: 1.4; max-width: 90%; }
.msg.user { align-self: flex-end; background: #0f3460; margin-left: auto; }
.msg.system { color: #888; font-size: 12px; font-style: italic; }
.messages { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="status-dot" id="statusDot"></div>
  <h1>CC Channel</h1>
</div>

<div class="content">
  <div class="section">
    <div class="section-title">Page Content</div>
    <button class="btn" id="readPageBtn">📄 Extract current page</button>
    <div id="pagePreview" style="display:none">
      <div class="preview">
        <div class="preview-title" id="pageTitle"></div>
        <div class="preview-url" id="pageUrl"></div>
        <div class="preview-body" id="pageContent"></div>
      </div>
      <button class="btn btn-primary" id="sendPageBtn" style="margin-top:6px" disabled>Send to CC</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Quick Message</div>
    <div class="messages" id="messages"></div>
  </div>
</div>

<div class="input-bar">
  <textarea id="chatInput" rows="1" placeholder="Message CC..."></textarea>
  <button class="send-btn" id="sendBtn">Send</button>
</div>

<script>
// Configure this to point to your hub
const HUB_URL = 'http://localhost:3456';

const $messages = document.getElementById('messages');
const $input = document.getElementById('chatInput');

function addMsg(text, cls) {
  const d = document.createElement('div');
  d.className = 'msg ' + cls;
  d.textContent = text;
  $messages.appendChild(d);
  $messages.scrollTop = $messages.scrollHeight;
}

function escapeForChannel(text) {
  return text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// Send message to CC via hub inject endpoint
async function sendToCC(text) {
  try {
    const res = await fetch(`${HUB_URL}/api/inject`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content: text, chat_id: 'chrome' })
    });
    return res.ok;
  } catch { return false; }
}

// Quick message
document.getElementById('sendBtn').addEventListener('click', async () => {
  const text = $input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  $input.value = '';
  const ok = await sendToCC(text);
  addMsg(ok ? '(sent to CC)' : '(failed)', 'system');
});

$input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); document.getElementById('sendBtn').click(); }
});

// Page extraction
let lastPage = null;

document.getElementById('readPageBtn').addEventListener('click', () => {
  chrome.runtime.sendMessage({ type: 'getPageContent' }, (response) => {
    const preview = document.getElementById('pagePreview');
    if (response?.error) {
      preview.style.display = 'none';
      lastPage = null;
      return;
    }
    document.getElementById('pageTitle').textContent = response.title;
    document.getElementById('pageUrl').textContent = response.url;
    let content = '';
    if (response.selection) content += `[Selected] ${response.selection}\n\n`;
    content += (response.bodyText || '(empty page)').slice(0, 2000);
    document.getElementById('pageContent').textContent = content;
    document.getElementById('sendPageBtn').disabled = false;
    preview.style.display = 'block';
    lastPage = response;
  });
});

document.getElementById('sendPageBtn').addEventListener('click', async () => {
  if (!lastPage) return;
  const btn = document.getElementById('sendPageBtn');
  btn.disabled = true;
  btn.textContent = 'Sending...';

  const text = lastPage.selection
    ? `[Page: ${lastPage.title}]\n${lastPage.url}\n\nSelected text:\n${lastPage.selection}`
    : `[Page: ${lastPage.title}]\n${lastPage.url}\n\n${(lastPage.bodyText || '').slice(0, 3000)}`;

  const ok = await sendToCC(text);
  btn.textContent = ok ? 'Sent!' : 'Failed';
  setTimeout(() => { btn.textContent = 'Send to CC'; btn.disabled = false; }, 2000);
});

// Health check
async function checkHealth() {
  try {
    const res = await fetch(`${HUB_URL}/health`);
    const data = await res.json();
    document.getElementById('statusDot').classList.toggle('online', data.cc_alive);
  } catch {
    document.getElementById('statusDot').classList.remove('online');
  }
}
checkHealth();
setInterval(checkHealth, 30000);
</script>
</body>
</html>
